name: CD

# Runs on every push to main and on semver tags (v1.2.3)
on:
  push:
    branches: [main]
    tags: ["v*.*.*"]

permissions:
  contents: read
  packages: write   # required to push to GHCR

env:
  REGISTRY: ghcr.io
  # github.repository → "jonathanCaamano/inventory-back"
  # GHCR normalises the owner to lowercase automatically.
  IMAGE: ghcr.io/${{ github.repository_owner }}/inventory-back

# ─────────────────────────────────────────────────────────────────────────────
# JOB 1 — Build the Go binary, then build & push the Docker image to GHCR
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest

    outputs:
      # Short image tag used by the deploy job (e.g. "sha-abc1234" or "v1.2.3")
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      # Validate binary compiles before we bother building a Docker image
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify binary compiles
        run: go build -o /dev/null ./cmd/server

      # ── Docker setup ────────────────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tagging strategy:
      #   push to main → latest + sha-<short>
      #   push v1.2.3  → 1.2.3 + 1.2 + latest
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # GitHub Actions cache keeps layer cache across runs
          cache-from: type=gha
          cache-to: type=gha,mode=max

# ─────────────────────────────────────────────────────────────────────────────
# JOB 2 — Deploy the new image to Kubernetes
#
# Required GitHub secrets:
#   KUBECONFIG       — base64-encoded kubeconfig for the target cluster
#   DB_PASSWORD      — PostgreSQL password
#   JWT_SECRET       — JWT signing secret (≥ 32 chars)
#   MINIO_ACCESS_KEY — MinIO / S3 access key
#   MINIO_SECRET_KEY — MinIO / S3 secret key
#   GHCR_PAT         — Personal Access Token with read:packages scope
#                      (used by the K8s cluster to pull from GHCR)
# ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    needs: build-push
    runs-on: ubuntu-latest
    # "production" environment can require manual approval in GitHub settings
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      # ── Resolve exact image tag ──────────────────────────────────────────────
      - name: Resolve image tag
        id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      # ── Namespace & ConfigMap ─────────────────────────────────────────────────
      - name: Apply namespace
        run: kubectl apply -f k8s/namespace.yaml

      - name: Apply ConfigMap
        run: kubectl apply -f k8s/configmap.yaml

      # ── Secrets (managed via GH Secrets, never committed in plaintext) ────────
      - name: Create / update application secret
        run: |
          kubectl create secret generic inventory-back-secrets \
            --from-literal=DB_USER=inventory \
            --from-literal=DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --from-literal=MINIO_ACCESS_KEY="${{ secrets.MINIO_ACCESS_KEY }}" \
            --from-literal=MINIO_SECRET_KEY="${{ secrets.MINIO_SECRET_KEY }}" \
            --namespace=inventory \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Create / update GHCR image pull secret
        run: |
          kubectl create secret docker-registry ghcr-secret \
            --docker-server=ghcr.io \
            --docker-username="${{ github.actor }}" \
            --docker-password="${{ secrets.GHCR_PAT }}" \
            --namespace=inventory \
            --dry-run=client -o yaml | kubectl apply -f -

      # ── Infrastructure (idempotent applies) ──────────────────────────────────
      - name: Apply PostgreSQL
        run: kubectl apply -f k8s/postgres.yaml

      - name: Apply MinIO
        run: kubectl apply -f k8s/minio.yaml

      # ── Deployment ───────────────────────────────────────────────────────────
      - name: Apply Deployment / Service / Ingress
        run: kubectl apply -f k8s/deployment.yaml

      - name: Update image tag
        run: |
          FULL_IMAGE="${{ env.IMAGE }}:${{ steps.tag.outputs.value }}"
          kubectl set image deployment/inventory-back \
            inventory-back="${FULL_IMAGE}" \
            --namespace=inventory

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/inventory-back \
            --namespace=inventory --timeout=5m
