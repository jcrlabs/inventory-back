name: release
on:
  push:
    tags:
      - "v*.*.*"
jobs:
  build_and_push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
      - name: Set version
        id: ver
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
      - name: Login to registry
        run: echo "${{ secrets.REGISTRY_PASSWORD }}" | docker login ${{ secrets.REGISTRY_HOST }} -u "${{ secrets.REGISTRY_USER }}" --password-stdin
      - name: Build image
        run: docker build -t ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_REPO }}:${{ steps.ver.outputs.VERSION }} .
      - name: Push image
        run: docker push ${{ secrets.REGISTRY_HOST }}/${{ secrets.REGISTRY_REPO }}:${{ steps.ver.outputs.VERSION }}
