replicaCount: 2

image:
  repository: ghcr.io/jcrlabs/inventory-back
  pullPolicy: IfNotPresent
  tag: ""
  pullSecretName: ghcr-pull-secret

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-cloudflare
  host: ""
  tls: true

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

hpa:
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

config:
  env: production
  dbHost: postgres-service
  dbPort: "5432"
  dbName: inventory
  dbSslMode: disable
  minioEndpoint: minio-service:9000
  minioBucket: inventory
  minioUseSsl: "false"
  minioPublicUrl: ""
  corsAllowedOrigins: "http://localhost:3000"

secretName: inventory-back-secrets

postgres:
  image: postgres:16-alpine
  storage: 10Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

minio:
  image: minio/minio:RELEASE.2024-01-16T16-07-38Z
  storage: 20Gi
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-cloudflare
    host: ""
    tls: true
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
