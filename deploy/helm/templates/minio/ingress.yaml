{{- if .Values.minio.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: minio-ingress
  labels:
    {{- include "inventory-back.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
  {{- with .Values.minio.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.minio.ingress.className }}
  {{- if .Values.minio.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.minio.ingress.host }}
      secretName: minio-tls
  {{- end }}
  rules:
    - host: {{ .Values.minio.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: minio-service
                port:
                  number: 9000
{{- end }}
