apiVersion: v1
kind: Service
metadata:
  name: minio-service
  labels:
    {{- include "inventory-back.labels" . | nindent 4 }}
    app.kubernetes.io/component: minio
spec:
  selector:
    app: minio
  ports:
    - name: api
      port: 9000
      targetPort: 9000
    - name: console
      port: 9001
      targetPort: 9001
  type: ClusterIP
